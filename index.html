<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MAHAM · استوديو مخطّط الموقع التفاعلي — صيف وسمره</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#081127; --navy2:#0c1d40; --panel:#0a1733; --line:rgba(120,150,210,.14);
    --gold:#C9A84C; --gold-soft:#E8C765; --gold-deep:#9c7e2f;
    --ink:#eef3ff; --muted:#90a4cb; --muted2:#62749b;
    --green:#3C9A5C; --blue:#3B7BC8; --red:#D45a4a; --violet:#8b6cf0;
    --glass:rgba(13,28,62,.62); --glass2:rgba(10,21,46,.85);
    --shadow:0 18px 50px -12px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'IBM Plex Sans Arabic','Cairo',system-ui,sans-serif;
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(201,168,76,.10), transparent 60%),
      radial-gradient(900px 600px at 0% 110%, rgba(59,123,200,.12), transparent 55%),
      linear-gradient(160deg,#060d20,#0a1733 55%,#081127);
    color:var(--ink); overflow:hidden; user-select:none; -webkit-font-smoothing:antialiased;
  }
  .app{display:grid;grid-template-rows:auto 1fr auto;height:100vh}

  /* ───── Top bar ───── */
  .top{display:flex;align-items:center;gap:12px;padding:10px 16px;
    background:linear-gradient(180deg,rgba(12,29,64,.92),rgba(8,17,39,.78));
    border-bottom:1px solid var(--line);backdrop-filter:blur(14px);z-index:30}
  .brand{display:flex;align-items:center;gap:11px;min-width:max-content}
  .logo-gem{width:40px;height:40px;filter:drop-shadow(0 5px 14px rgba(201,168,76,.5))}
  .brand-txt h1{font-size:17px;font-weight:800;letter-spacing:.6px;line-height:1.05;font-family:'Cairo','IBM Plex Sans Arabic';color:#fff}
  .brand-txt h1 .mx{color:var(--gold-soft);font-weight:700}
  .brand-txt p{font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}
  .brandmark{position:absolute;right:14px;bottom:14px;z-index:15;display:flex;align-items:center;gap:9px;
    background:linear-gradient(145deg,rgba(13,28,62,.86),rgba(8,17,39,.78));border:1px solid rgba(201,168,76,.32);
    border-radius:12px;padding:8px 12px 8px 10px;backdrop-filter:blur(10px);box-shadow:var(--shadow)}
  .brandmark .bm-gem{width:30px;height:30px;flex:none;filter:drop-shadow(0 3px 8px rgba(201,168,76,.4))}
  .brandmark .bm-1{font-size:12px;font-weight:700;color:var(--gold-soft);font-family:'Cairo','IBM Plex Sans Arabic';letter-spacing:.3px}
  .brandmark .bm-2{font-size:10.5px;color:var(--muted);font-weight:500;margin-top:1px}
  .top .sp{flex:1}
  .seg{display:flex;background:rgba(8,17,39,.7);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px}
  .seg button{border:0;background:transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;
    padding:7px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.18s}
  .seg button:hover{color:var(--ink)}
  .seg button.on{background:linear-gradient(145deg,rgba(201,168,76,.22),rgba(201,168,76,.08));color:var(--gold-soft);box-shadow:inset 0 0 0 1px rgba(201,168,76,.4)}
  .tbtn{border:1px solid var(--line);background:rgba(8,17,39,.6);color:var(--ink);
    font-family:inherit;font-size:12.5px;font-weight:600;padding:8px 12px;border-radius:10px;cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:.18s;white-space:nowrap}
  .tbtn:hover{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.10);color:var(--gold-soft)}
  .tbtn.on{border-color:rgba(201,168,76,.6);background:rgba(201,168,76,.16);color:var(--gold-soft)}
  .tbtn.gold{background:linear-gradient(145deg,var(--gold),var(--gold-deep));color:#10203f;border-color:transparent;box-shadow:0 6px 16px -6px rgba(201,168,76,.7)}
  .tbtn.gold:hover{filter:brightness(1.08);color:#0a1530}

  /* ───── Body grid ───── */
  .body{display:grid;grid-template-columns:64px 1fr 320px;overflow:hidden;position:relative}

  /* tool rail */
  .rail{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 0;
    background:linear-gradient(180deg,rgba(10,23,51,.7),rgba(8,17,39,.5));border-left:1px solid var(--line);z-index:20}
  .tool{width:42px;height:42px;border-radius:12px;border:1px solid transparent;background:rgba(8,17,39,.4);
    color:var(--muted);cursor:pointer;display:grid;place-items:center;transition:.16s;position:relative}
  .tool:hover{color:var(--ink);background:rgba(201,168,76,.10);border-color:rgba(201,168,76,.3)}
  .tool.on{color:var(--gold-soft);background:linear-gradient(145deg,rgba(201,168,76,.26),rgba(201,168,76,.06));border-color:rgba(201,168,76,.55);box-shadow:0 0 0 1px rgba(201,168,76,.25), inset 0 0 12px rgba(201,168,76,.12)}
  .tool svg{width:20px;height:20px}
  .tool[data-tip]:hover::after{content:attr(data-tip);position:absolute;right:50px;top:50%;transform:translateY(-50%);
    background:var(--glass2);border:1px solid var(--line);color:var(--ink);font-size:11px;font-weight:600;
    padding:5px 9px;border-radius:8px;white-space:nowrap;pointer-events:none;z-index:50;box-shadow:var(--shadow)}
  .rail .div{width:30px;height:1px;background:var(--line);margin:5px 0}

  /* canvas */
  .stage{position:relative;overflow:hidden}
  svg.map{width:100%;height:100%;display:block;cursor:crosshair;touch-action:none}
  svg.map.pan{cursor:grab}svg.map.panning{cursor:grabbing}svg.map.sel{cursor:default}

  .hud{position:absolute;left:14px;bottom:14px;display:flex;gap:8px;align-items:center;z-index:15}
  .hud .chip{background:var(--glass2);border:1px solid var(--line);border-radius:10px;padding:6px 11px;font-size:11.5px;color:var(--muted);font-weight:600;backdrop-filter:blur(8px)}
  .hud .chip b{color:var(--gold-soft)}
  .zoomctl{position:absolute;left:14px;top:14px;display:flex;flex-direction:column;gap:6px;z-index:15}
  .zoomctl button{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--glass2);color:var(--ink);cursor:pointer;font-size:18px;display:grid;place-items:center;backdrop-filter:blur(8px);transition:.16s}
  .zoomctl button:hover{border-color:rgba(201,168,76,.5);color:var(--gold-soft)}

  .legend{position:absolute;right:14px;top:14px;z-index:15;background:var(--glass2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;backdrop-filter:blur(10px);max-width:210px}
  .legend h4{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px;letter-spacing:.3px}
  .legend .row{display:flex;align-items:center;gap:8px;font-size:11.5px;margin:5px 0;color:var(--ink)}
  .legend .dot{width:11px;height:11px;border-radius:4px;flex:none}
  .legend .ln{width:18px;height:0;border-top:2px dashed var(--gold);flex:none}

  /* unit palette */
  .upal{position:absolute;bottom:14px;left:50%;transform:translateX(-50%) translateY(14px);z-index:18;display:none;
    gap:6px;background:var(--glass2);border:1px solid rgba(201,168,76,.35);border-radius:14px;padding:8px;backdrop-filter:blur(12px);box-shadow:var(--shadow);opacity:0;transition:.22s}
  .upal.show{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
  .upal button{display:flex;flex-direction:column;align-items:center;gap:4px;width:62px;padding:7px 4px;border-radius:10px;
    border:1px solid transparent;background:rgba(8,17,39,.5);color:var(--muted);cursor:pointer;font-family:inherit;font-size:10.5px;font-weight:600;transition:.15s}
  .upal button:hover{color:var(--ink);border-color:rgba(201,168,76,.3)}
  .upal button.on{color:#fff;border-color:rgba(201,168,76,.6);background:rgba(201,168,76,.14)}
  .upal button svg{width:24px;height:24px}

  .toast{position:absolute;left:50%;bottom:78px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--glass2);border:1px solid rgba(201,168,76,.4);color:var(--gold-soft);font-size:12.5px;font-weight:600;
    padding:9px 16px;border-radius:11px;backdrop-filter:blur(10px);z-index:60;transition:.3s;pointer-events:none;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* inspector */
  .insp{background:linear-gradient(180deg,rgba(10,23,51,.78),rgba(8,17,39,.6));
    border-right:1px solid var(--line);overflow-y:auto;z-index:20;backdrop-filter:blur(10px)}
  .insp::-webkit-scrollbar{width:8px}.insp::-webkit-scrollbar-thumb{background:rgba(120,150,210,.2);border-radius:8px}
  .insp .sec{padding:15px 16px;border-bottom:1px solid var(--line)}
  .insp h3{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.4px;margin-bottom:12px;display:flex;align-items:center;gap:7px;text-transform:uppercase}
  .insp h3 svg{width:14px;height:14px;color:var(--gold)}
  .field{margin-bottom:11px}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500}
  .field input[type=text],.field input[type=number],.field textarea,.field select{
    width:100%;background:rgba(6,13,32,.7);border:1px solid var(--line);border-radius:9px;
    color:var(--ink);font-family:inherit;font-size:13px;padding:8px 10px;transition:.15s}
  .field textarea{resize:vertical;min-height:50px;line-height:1.6}
  .field input:focus,.field textarea:focus,.field select:focus{outline:0;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.13)}
  .field select{cursor:pointer}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .swatches{display:flex;flex-wrap:wrap;gap:7px}
  .sw{width:26px;height:26px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:.15s}
  .sw.on{border-color:#fff;transform:scale(1.12);box-shadow:0 4px 12px rgba(0,0,0,.5)}
  .typegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
  .typegrid button{display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 4px;border-radius:10px;
    border:1px solid var(--line);background:rgba(8,17,39,.5);color:var(--muted);cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;transition:.15s}
  .typegrid button:hover{color:var(--ink);border-color:rgba(201,168,76,.4)}
  .typegrid button.on{color:#fff;background:rgba(201,168,76,.16);border-color:rgba(201,168,76,.55)}
  .typegrid button svg{width:24px;height:24px}
  .stat-status{display:flex;gap:7px}
  .stat-status button{flex:1;font-size:11.5px;font-weight:600;padding:8px 0;border-radius:9px;border:1px solid var(--line);background:rgba(8,17,39,.5);color:var(--muted);cursor:pointer;transition:.15s}
  .stat-status button.on[data-s=leased]{background:rgba(60,154,92,.2);color:#6fd496;border-color:rgba(60,154,92,.5)}
  .stat-status button.on[data-s=partnership]{background:rgba(59,123,200,.2);color:#7db4ee;border-color:rgba(59,123,200,.5)}
  .stat-status button.on[data-s=vacant]{background:rgba(212,90,74,.2);color:#f0928a;border-color:rgba(212,90,74,.5)}
  .insp-actions{display:flex;gap:8px;margin-top:6px}
  .insp-actions button{flex:1;font-size:12px;font-weight:600;padding:9px 0;border-radius:9px;border:1px solid var(--line);background:rgba(8,17,39,.5);color:var(--ink);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px}
  .insp-actions button:hover{border-color:rgba(201,168,76,.5)}
  .insp-actions button.danger:hover{border-color:rgba(212,90,74,.6);background:rgba(212,90,74,.12);color:#f0928a}
  .empty{padding:34px 22px;text-align:center;color:var(--muted2)}
  .empty .big{width:62px;height:62px;margin:0 auto 16px;border-radius:18px;background:rgba(201,168,76,.08);display:grid;place-items:center;color:var(--gold)}
  .empty .big svg{width:30px;height:30px}
  .empty h4{font-size:14px;color:var(--ink);margin-bottom:8px;font-weight:600}
  .empty p{font-size:12px;line-height:1.8}
  .kbd{display:inline-block;background:rgba(8,17,39,.8);border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 7px;font-size:11px;font-family:monospace;color:var(--gold-soft);margin:0 2px}
  .layer-row{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:12.5px;cursor:pointer}
  .layer-row .tg{width:34px;height:19px;border-radius:20px;background:rgba(8,17,39,.8);border:1px solid var(--line);position:relative;transition:.2s;flex:none}
  .layer-row .tg::after{content:'';position:absolute;width:13px;height:13px;border-radius:50%;background:var(--muted);top:2px;right:2px;transition:.2s}
  .layer-row.on .tg{background:rgba(201,168,76,.3);border-color:rgba(201,168,76,.5)}
  .layer-row.on .tg::after{background:var(--gold-soft);right:16px}
  .layer-row span{flex:1;color:var(--muted)}.layer-row.on span{color:var(--ink)}
  .feat-list{max-height:210px;overflow-y:auto}
  .feat-list::-webkit-scrollbar{width:6px}.feat-list::-webkit-scrollbar-thumb{background:rgba(120,150,210,.2);border-radius:6px}
  .feat-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:9px;cursor:pointer;transition:.14s;font-size:12.5px}
  .feat-item:hover{background:rgba(201,168,76,.08)}
  .feat-item.on{background:rgba(201,168,76,.14);box-shadow:inset 0 0 0 1px rgba(201,168,76,.35)}
  .feat-item .ic{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;flex:none}
  .feat-item .ic svg{width:15px;height:15px}
  .feat-item .nm{flex:1;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .feat-item .ar{font-size:10.5px;color:var(--muted2)}
  .bottom{display:flex;align-items:center;gap:16px;padding:8px 18px;background:linear-gradient(0deg,rgba(12,29,64,.92),rgba(8,17,39,.7));border-top:1px solid var(--line);font-size:12px;z-index:30}
  .stat{display:flex;align-items:center;gap:7px;color:var(--muted)}
  .stat b{color:var(--ink);font-weight:700;font-size:13px}
  .stat .pill{width:9px;height:9px;border-radius:50%}
  .bottom .sp{flex:1}
  .bottom .save-ind{color:var(--muted2);font-size:11px;display:flex;align-items:center;gap:6px}
  .bottom .save-ind .live{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .ghost-vert{fill:#fff;stroke:var(--gold);stroke-width:1.5;cursor:move}
  input[type=file]{display:none}
  input[type=range]{width:100%;accent-color:var(--gold)}
  .modal-bg{position:fixed;inset:0;background:rgba(4,9,22,.7);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center}
  .modal-bg.show{display:flex}
  .modal{background:linear-gradient(160deg,#0c1d40,#081127);border:1px solid rgba(201,168,76,.3);border-radius:18px;padding:26px;max-width:440px;width:90%;box-shadow:var(--shadow)}
  .modal h2{font-size:17px;margin-bottom:6px;color:var(--gold-soft)}
  .modal p{font-size:13px;color:var(--muted);line-height:1.9;margin-bottom:18px}
  .modal .row{display:flex;gap:10px;justify-content:flex-end}
</style>
</head>
<body>
<div class="app">

  <!-- ════════ TOP BAR ════════ -->
  <header class="top">
    <div class="brand">
      <svg class="logo-gem" viewBox="0 0 48 48" aria-label="MAHAM Mexpo">
        <defs>
          <linearGradient id="gemG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F0D98A"/><stop offset=".5" stop-color="#C9A84C"/><stop offset="1" stop-color="#8c6f2a"/></linearGradient>
        </defs>
        <path d="M24 2 L44 14 V34 L24 46 L4 34 V14 Z" fill="url(#gemG)" stroke="#F0D98A" stroke-width="1" stroke-opacity=".6"/>
        <path d="M24 2 L44 14 L24 22 L4 14 Z" fill="#fff" fill-opacity=".18"/>
        <text x="24" y="31" text-anchor="middle" font-family="Cairo,sans-serif" font-weight="800" font-size="20" fill="#0e1c38">M</text>
      </svg>
      <div class="brand-txt">
        <h1>MAHAM <span class="mx">Mexpo</span></h1>
        <p>مهام إكسبو · استوديو مخطّط الموقع</p>
      </div>
    </div>
    <div class="seg" id="viewSeg" style="margin-inline-start:8px">
      <button data-view="day" class="on">☀︎ النهار</button>
      <button data-view="night">☾ الليل</button>
      <button data-view="blueprint">▦ مخطّط</button>
      <button data-view="density">◉ الكثافة</button>
    </div>
    <div class="sp"></div>
    <button class="tbtn" id="btnTidy" title="ترتيب القطع في صفوف منظّمة">✦ ترتيب</button>
    <button class="tbtn" id="btnSnap" title="تثبيت الحركة على الشبكة">⊞ شبكة</button>
    <button class="tbtn" id="btnUndo" title="تراجع (Ctrl+Z)">↶</button>
    <button class="tbtn" id="btnRedo" title="إعادة (Ctrl+Y)">↷</button>
    <button class="tbtn" id="btnUnderlay" title="تحميل صورة مرجعية من الـ CAD">⌖ مرجع</button>
    <button class="tbtn" id="btnImport">⭳ استيراد</button>
    <button class="tbtn" id="btnExport">⭱ تصدير</button>
    <button class="tbtn gold" id="btnSave">✓ حفظ</button>
    <input type="file" id="fileImport" accept="application/json,.json" />
    <input type="file" id="fileUnderlay" accept="image/*" />
  </header>

  <!-- ════════ BODY ════════ -->
  <div class="body">
    <nav class="rail" id="rail">
      <button class="tool on" data-tool="select" data-tip="تحديد ونقل (V)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.5 18 2-7 7-2L3 3z"/></svg></button>
      <button class="tool" data-tool="zone" data-tip="رسم منطقة/قطعة (Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5l14 3-4 11-9-3z"/><circle cx="5" cy="5" r="1.6" fill="currentColor"/><circle cx="19" cy="8" r="1.6" fill="currentColor"/><circle cx="15" cy="19" r="1.6" fill="currentColor"/><circle cx="6" cy="16" r="1.6" fill="currentColor"/></svg></button>
      <button class="tool" data-tool="unit" data-tip="إضافة وحدة: كبينة/كشك/محل (U)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9l1.5-4h13L20 9M4 9h16v9a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9zM9 19v-5h6v5"/></svg></button>
      <button class="tool" data-tool="place" data-tip="نقطة/مَعلم (P)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.4 7-11.5A7 7 0 0 0 5 9.5C5 14.6 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.5"/></svg></button>
      <div class="div"></div>
      <button class="tool" data-tool="pan" data-tip="تحريك العرض (مسافة)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11V5.5a1.5 1.5 0 0 1 3 0V11m0-1.5a1.5 1.5 0 0 1 3 0V12m0-1a1.5 1.5 0 0 1 3 0v4a6 6 0 0 1-6 6h-1.5a6 6 0 0 1-5.3-3.2L4 14s-.7-1.5.6-2.1c1-.5 1.9.4 1.9.4L9 14"/></svg></button>
      <button class="tool" data-tool="delete" data-tip="حذف بالنقر (D)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4h6v3m-8 0l1 14h8l1-14"/></svg></button>
      <div class="div"></div>
      <button class="tool" data-tool="fit" data-tip="ملء الشاشة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
    </nav>

    <div class="stage" id="stage">
      <svg class="map" id="map" viewBox="0 0 770 1084" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="zoomctl"><button id="zIn">+</button><button id="zOut">−</button></div>
      <div class="legend" id="legend">
        <h4>دليل المخطّط</h4>

  return [[-w/2,-h/2],[w/2,-h/2],[w/2,h/2],[-w/2,h/2]].map(([x,y])=>[+(cx+x*c-y*s).toFixed(1),+(cy+x*s+y*c).toFixed(1)]);}

function smoothClosed(P){const n=P.length;let d=`M ${((P[0][0]+P[n-1][0])/2).toFixed(1)} ${((P[0][1]+P[n-1][1])/2).toFixed(1)}`;

function pip(x,y,poly){let inside=false;for(let i=0,j=poly.length-1;i<poly.length;j=i++){const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];if(((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))inside=!inside;}return inside;}

/* ═══════════ PERSISTENCE ═══════════ */
function snapshot(){return JSON.stringify({features:S.features,visitorPath:S.visitorPath,meta:S.meta});}
function pushUndo(){undoStack.push(snapshot());if(undoStack.length>70)undoStack.shift();redoStack=[];refreshUndo();}
function applySnap(j){const o=JSON.parse(j);S.features=o.features;S.visitorPath=o.visitorPath;S.meta=o.meta;}
function undo(){if(!undoStack.length)return;redoStack.push(snapshot());applySnap(undoStack.pop());sel=null;renderAll();save();refreshUndo();toast('تراجع');}
function redo(){if(!redoStack.length)return;undoStack.push(snapshot());applySnap(redoStack.pop());sel=null;renderAll();save();refreshUndo();toast('إعادة');}
function refreshUndo(){$('#btnUndo').style.opacity=undoStack.length?1:.4;$('#btnRedo').style.opacity=redoStack.length?1:.4;}

//    with an Authorization header. While empty, save stays reliable in localStorage (per device).
const CLOUD={ url:'', method:'PUT', headers:{'Content-Type':'application/json'} };
function cloudPush(payload){ if(!CLOUD.url)return;
  fetch(CLOUD.url,{method:CLOUD.method,headers:CLOUD.headers,body:JSON.stringify(payload)})
    .then(r=>{$('#saveTxt').textContent=(r.ok?'محفوظ سحابياً ✓ · ':'محفوظ محلياً (تعذّر السحابي) · ')+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});})
    .catch(()=>{$('#saveTxt').textContent='محفوظ محلياً (لا اتصال سحابي)';}); }
let saveT;
function save(){clearTimeout(saveT);saveT=setTimeout(()=>{S.meta.updated=new Date().toISOString();
  const payload={...S,underlay};
  localStorage.setItem(STORE_KEY,JSON.stringify(payload));
  $('#saveTxt').textContent=(CLOUD.url?'…مزامنة سحابية':'محفوظ محلياً')+' · '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  cloudPush(payload);},400);}

function treeAt(x,y,sc,col){return `<g transform="translate(${(+x).toFixed(1)} ${(+y).toFixed(1)}) scale(${sc})"><rect x="-1" y="0" width="2" height="5" fill="#6b4f2a"/><circle cy="-2" r="5" fill="${col}"/><circle cx="-2.6" cy="-4" r="3" fill="${col}" opacity=".82"/><circle cx="2.6" cy="-4" r="3" fill="${col}" opacity=".82"/></g>`;}

/* ═══════════ RENDER ═══════════ */
function renderAll(){

    <g id="viewportRoot"><g id="viewport">
      <g id="underlayG"></g><g id="terrainLayers"></g>
      <g id="pathG"></g><g id="zonesG"></g><g id="unitsG"></g><g id="placesG"></g>
      <g id="draftG"></g><g id="handlesG"></g>
    </g></g>`;
  const vp=$('#terrainLayers');
  ['lWater','lRoads','lRocky','lTerrain','lParking','ringG'].forEach(id=>{const g=$('#'+id);if(g)vp.appendChild(g);});
  $('#lWater').style.display=layers.water?'':'none';
  $('#lRoads').style.display=layers.roads?'':'none';
  $('#lParking').style.display=layers.parking?'':'none';
  $('#lRocky').style.display=layers.rocky?'':'none';
  $('#lTerrain').style.display=layers.terrain?'':'none';
  $('#ringG').style.display=layers.terrain?'':'none';
  renderUnderlay();renderPath();renderZones();renderUnits();renderPlaces();renderHandles();
  applyViewport();applyView();updateStats();buildInspector();
}
function renderUnderlay(){const g=$('#underlayG');if(!g)return;g.innerHTML='';
  if(underlay&&layers.underlay){const im=el('image',{x:18,y:18,width:734,height:1048,preserveAspectRatio:'xMidYMid meet',opacity:underlay.opacity??.5});
    im.setAttribute('href',underlay.href);im.setAttributeNS('http://www.w3.org/1999/xlink','href',underlay.href);g.appendChild(im);}}
function renderPath(){const g=$('#pathG');if(!g)return;g.innerHTML='';
  if(!layers.path||!S.visitorPath||S.visitorPath.length<2)return;
  const d='M '+S.visitorPath.map(p=>p[0]+' '+p[1]).join(' L ');
  const base=el('path',{d,fill:'none',stroke:'#C9A84C',"stroke-width":3,"stroke-opacity":.85,"stroke-linecap":'round',"stroke-dasharray":'2 10'});
  base.style.filter='drop-shadow(0 0 4px rgba(201,168,76,.6))';
  base.appendChild(el('animate',{attributeName:'stroke-dashoffset',from:0,to:-120,dur:'4s',repeatCount:'indefinite'}));
  g.appendChild(base);
  S.visitorPath.forEach(p=>g.appendChild(el('circle',{cx:p[0],cy:p[1],r:2.6,fill:'#E8C765'})));}
function zoneCenter(f){let x=0,y=0;f.points.forEach(p=>{x+=p[0];y+=p[1];});return [x/f.points.length,y/f.points.length];}
function zoneFill(f){if(view==='density'){const c=f.capacity||0;return c>=80?'#D45a4a':c>=60?'#E89A4B':c>=40?'#C9A84C':'#3B7BC8';}
  if(view==='blueprint')return 'transparent';return STATUS[f.status]?.color||f.color;}
function renderZones(){const g=$('#zonesG');if(!g)return;g.innerHTML='';if(!layers.zones)return;
  S.features.filter(f=>f.kind==='zone').forEach(f=>{
    const pts=f.points.map(p=>p.join(',')).join(' ');const isSel=f.id===sel;const fill=zoneFill(f);
    const stroke=view==='blueprint'?'#6fd0ff':(STATUS[f.status]?.color||f.color);
    const poly=el('polygon',{points:pts,fill,"fill-opacity":view==='blueprint'?0:(isSel?.42:.24),
      stroke,"stroke-width":isSel?2.6:1.5,"stroke-opacity":isSel?1:.8,"stroke-linejoin":'round',class:'zone'});
    poly.dataset.id=f.id;poly.style.cursor=tool==='select'?'move':(tool==='delete'?'pointer':'crosshair');
    if(isSel)poly.style.filter='drop-shadow(0 0 10px '+stroke+'66)';
    g.appendChild(poly);
    if(layers.labels){const [cx,cy]=zoneCenter(f);
      const t=el('text',{x:cx,y:cy-2,"text-anchor":'middle',class:'zoneLbl'});t.textContent=f.name_ar;
      const t2=el('text',{x:cx,y:cy+12,"text-anchor":'middle',class:'zoneLbl2'});

function renderUnits(){const g=$('#unitsG');if(!g)return;g.innerHTML='';if(!layers.units)return;
  S.features.filter(f=>f.kind==='unit').forEach(f=>{

function renderPlaces(){const g=$('#placesG');if(!g)return;g.innerHTML='';if(!layers.places)return;

function renderHandles(){const g=$('#handlesG');if(!g)return;g.innerHTML='';if(tool!=='select'||!sel)return;

function applyView(){map.classList.remove('vDay','vNight','vBlue','vDensity');

/* ═══════════ STATS ═══════════ */
function fmtArea(a){return a>=1000?(a/1000).toLocaleString('ar-EG',{maximumFractionDigits:1})+'k م²':a.toLocaleString('ar-EG',{maximumFractionDigits:1})+' م²';}
function updateStats(){const z=S.features.filter(f=>f.kind==='zone');const u=S.features.filter(f=>f.kind==='unit');
  const all=[...z,...u];
  $('#stZones').textContent=z.length;$('#stUnits').textContent=u.length;

/* ═══════════ INSPECTOR ═══════════ */
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function buildInspector(){

    } else {

        <div class="field"><label>التصنيف</label><select id="fCat">${Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${f.cat===k?'selected':''}>${v.ar}</option>`).join('')}</select></div>`;
    }
    html+=`<div class="field"><label>الحالة</label><div class="stat-status">${Object.entries(STATUS).map(([k,v])=>`<button data-s="${k}" class="${f.status===k?'on':''}">${v.ar}</button>`).join('')}</div></div>`;
    if(isZone)html+=`<div class="grid2"><div class="field"><label>المساحة (م²)</label><input type="number" id="fArea" value="${f.area||0}" step="0.01"/></div><div class="field"><label>الإشغال %</label><input type="number" id="fCap" value="${f.capacity||0}" min="0" max="100"/></div></div>`;
    if(isUnit)html+=`<div class="grid2"><div class="field"><label>المساحة (م²)</label><input type="number" id="fArea" value="${f.area||0}" step="0.1"/></div><div class="field"><label>السعر (ريال)</label><input type="number" id="fPrice" value="${f.price||0}"/></div></div>`;
    if(!isUnit)html+=`<div class="field"><label>اللون</label><div class="swatches" id="fSw">${SWATCH.map(c=>`<div class="sw ${f.color===c?'on':''}" style="background:${c}" data-c="${c}"></div>`).join('')}</div></div>
      <div class="field"><label>الأنشطة (مفصولة بفاصلة)</label><input type="text" id="fAct" value="${esc((f.activities||[]).join('، '))}"/></div>`;
    html+=`<div class="field"><label>ملاحظات</label><textarea id="fNotes">${esc(f.notes||'')}</textarea></div>
      <div class="insp-actions"><button id="fDup">⧉ تكرار</button><button id="fDel" class="danger">🗑 حذف</button></div></div>`;
  } else {
    html+=`<div class="empty"><div class="big"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 20l9-5-9-5-9 5 9 5z"/><path d="M12 4L3 9l9 5 9-5-9-5z"/><path d="M3 14l9 5 9-5"/></svg></div>
      <h4>لوحة التحرير</h4>
      <p>أداة <b style="color:var(--gold-soft)">وحدة</b> 🏪 تفتح لوحة الأنواع (كبينة/كشك/محل/عربة/خيمة/جناح) ثم انقر لوضعها.<br>
      أداة <b style="color:var(--gold-soft)">رسم منطقة</b> لرسم قطعة، و<b style="color:var(--gold-soft)">مَعلم</b> لنقطة دالّة.<br><br>
      انقر أي عنصر لتحديده وتعديل خصائصه هنا.</p>
      <p style="margin-top:12px;font-size:11px"><span class="kbd">V</span> تحديد · <span class="kbd">Z</span> منطقة · <span class="kbd">U</span> وحدة · <span class="kbd">P</span> معلم<br>
      <span class="kbd">Enter</span> إنهاء الرسم · <span class="kbd">Del</span> حذف · <span class="kbd">Ctrl+Z</span> تراجع</p></div>`;
  }
  // layers
  html+=`<div class="sec"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l9 5-9 5-9-5 9-5z"/><path d="M3 12l9 5 9-5M3 17l9 5 9-5"/></svg> الطبقات</h3>
    ${[['zones','القطع'],['units','الوحدات'],['unitLabels','أسماء الوحدات'],['places','المعالم'],['path','مسار الزوّار'],['parking','المواقف'],['roads','الطرق'],['water','المياه'],['rocky','المناطق الصخرية'],['terrain','الأرضية'],['labels','التسميات'],['underlay','المرجع']].map(([k,n])=>
      `<div class="layer-row ${layers[k]?'on':''}" data-lay="${k}"><div class="tg"></div><span>${n}</span></div>`).join('')}</div>`;
  // list
  const list=S.features;
  html+=`<div class="sec"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg> العناصر (${list.length})</h3>
    <div class="feat-list">${list.map(f=>{const col=STATUS[f.status]?.color||f.color||'#888';
      const ic=f.kind==='unit'?`<svg viewBox="-13 -13 26 26">${unitGlyph(f.unitType,col,1.8)}</svg>`:(f.kind==='zone'?'▱':'📍');

      return `<div class="feat-item ${f.id===sel?'on':''}" data-fid="${f.id}"><div class="ic" style="background:${col}22;color:${col}">${ic}</div>

function wireInspector(f){
  $$('.layer-row',$('#insp')).forEach(r=>r.onclick=()=>{layers[r.dataset.lay]=!layers[r.dataset.lay];renderAll();save();});
  $$('.feat-item',$('#insp')).forEach(it=>it.onclick=()=>{sel=it.dataset.fid;focusFeature(sel);renderAll();});
  if(!f)return;
  const commit=mut=>{pushUndo();mut();renderAll();save();};
  $('#fName').oninput=e=>{f.name_ar=e.target.value;renderZones();renderUnits();renderPlaces();save();};
  $('#fCode')&&($('#fCode').oninput=e=>{f.code=e.target.value;save();});
  $('#fNameEn')&&($('#fNameEn').oninput=e=>{f.name_en=e.target.value;save();});
  $('#fTenant')&&($('#fTenant').oninput=e=>{f.tenant=e.target.value;save();});
  $('#fCat')&&($('#fCat').onchange=e=>commit(()=>{f.cat=e.target.value;f.color=CATS[e.target.value].color;}));
  $('#fArea')&&($('#fArea').oninput=e=>{f.area=+e.target.value;updateStats();renderZones();save();});
  $('#fCap')&&($('#fCap').oninput=e=>{f.capacity=clamp(+e.target.value,0,100);if(view==='density')renderZones();save();});
  $('#fPrice')&&($('#fPrice').oninput=e=>{f.price=+e.target.value;save();});
  $('#fAct')&&($('#fAct').oninput=e=>{f.activities=e.target.value.split(/[،,]/).map(s=>s.trim()).filter(Boolean);save();});
  $('#fNotes').oninput=e=>{f.notes=e.target.value;save();};
  $$('.stat-status button',$('#insp')).forEach(b=>b.onclick=()=>commit(()=>f.status=b.dataset.s));
  $$('#fType button').forEach(b=>b.onclick=()=>commit(()=>{f.unitType=b.dataset.t;f.color=UNIT_TYPES[b.dataset.t].accent;}));
  $$('#fSw .sw').forEach(s=>s.onclick=()=>commit(()=>f.color=s.dataset.c));
  $('#fDup').onclick=()=>duplicate(f);$('#fDel').onclick=()=>delFeature(f.id);
}

/* ═══════════ OPS ═══════════ */
function focusFeature(id){const f=S.features.find(x=>x.id===id);if(!f)return;
  let cx,cy;if(f.kind==='zone'){[cx,cy]=zoneCenter(f);}else{cx=f.x;cy=f.y;}
  zoom=clamp(Math.max(zoom,1.6),1.6,3);panX=VBW/2-cx*zoom;panY=VBH/2-cy*zoom;applyViewport();}
function duplicate(f){pushUndo();const c=JSON.parse(JSON.stringify(f));c.id=uid();c.name_ar=f.name_ar+' (نسخة)';c.code=nextCode(f.kind==='zone'?'Z-':f.kind==='unit'?'K-':'P-');
  if(c.kind==='zone')c.points=c.points.map(p=>[p[0]+24,p[1]+24]);else{c.x+=24;c.y+=24;}
  S.features.push(c);sel=c.id;renderAll();save();toast('تم التكرار');}
function delFeature(id){pushUndo();S.features=S.features.filter(x=>x.id!==id);if(sel===id)sel=null;renderAll();save();toast('حُذف العنصر');}
function nextCode(prefix){let max=0;S.features.forEach(f=>{if(f.code&&f.code.indexOf(prefix)===0){const m=f.code.slice(prefix.length).match(/\d+/);if(m)max=Math.max(max,+m[0]);}});return prefix+String(max+1).padStart(2,'0');}

/* tidy: re-lay zones into neat rows along the spine */
function tidyZones(){
  const zs=S.features.filter(f=>f.kind==='zone');if(!zs.length)return;
  pushUndo();
  // sort big plazas to bottom row, normal parcels grid above
  const small=zs.filter(z=>(z.area||0)<1000), big=zs.filter(z=>(z.area||0)>=1000);
  const startX=560,startY=300,colW=104,rowH=84,cols=4;
  small.forEach((z,i)=>{const r=Math.floor(i/cols),c=i%cols;
    const cx=startX+c*colW+ (r*26), cy=startY+r*rowH;
    z.points=rectPts(cx,cy,84,56,SPINE_ROT);});
  big.forEach((z,i)=>{const cx=600+i*180, cy=startY+Math.ceil(small.length/cols)*rowH+30;
    z.points=rectPts(cx,cy,140,80,SPINE_ROT);});
  renderAll();save();toast('رُتّبت القطع في صفوف منظّمة');
}

/* ═══════════ TOOLS ═══════════ */
function setTool(t){if(t==='fit'){fit();return;}
  tool=t;draft=null;$('#draftG')&&($('#draftG').innerHTML='');
  $$('.tool').forEach(b=>b.classList.toggle('on',b.dataset.tool===t));
  map.classList.remove('pan','sel','panning');if(t==='pan')map.classList.add('pan');else if(t==='select')map.classList.add('sel');
  $('#upal').classList.toggle('show',t==='unit');
  applyView();
  const names={select:'تحديد',zone:'رسم منطقة',unit:'وحدة',place:'معلم',pan:'تحريك',delete:'حذف'};
  $('#modeChip').textContent='أداة: '+(names[t]||t);
  renderZones();renderUnits();renderPlaces();renderHandles();}
$$('.tool').forEach(b=>b.onclick=()=>setTool(b.dataset.tool));

/* unit palette */
function buildPalette(){$('#upal').innerHTML=Object.entries(UNIT_TYPES).map(([k,v])=>
  `<button data-u="${k}" class="${currentUnit===k?'on':''}"><svg viewBox="-13 -13 26 26">${unitGlyph(k,'#fff',1.6)}</svg>${v.ar}</button>`).join('');
  $$('#upal button').forEach(b=>b.onclick=()=>{currentUnit=b.dataset.u;buildPalette();});}

/* view modes */
$$('#viewSeg button').forEach(b=>b.onclick=()=>{view=b.dataset.view;$$('#viewSeg button').forEach(x=>x.classList.toggle('on',x===b));renderAll();save();});

/* zoom */
function setZoom(z,cx,cy){const old=zoom;zoom=clamp(z,.4,4);if(cx!=null){panX=cx-(cx-panX)*(zoom/old);panY=cy-(cy-panY)*(zoom/old);}applyViewport();}
$('#zIn').onclick=()=>setZoom(zoom*1.2);$('#zOut').onclick=()=>setZoom(zoom/1.2);
function fit(){zoom=1;panX=0;panY=0;applyViewport();toast('ملء الشاشة');}
map.addEventListener('wheel',e=>{e.preventDefault();const r=map.getBoundingClientRect();
  const sc=Math.min(r.width/VBW,r.height/VBH),offx=(r.width-VBW*sc)/2,offy=(r.height-VBH*sc)/2;
  const sx=(e.clientX-r.left-offx)/sc,sy=(e.clientY-r.top-offy)/sc;setZoom(zoom*(e.deltaY<0?1.1:.9),sx,sy);},{passive:false});

/* ═══════════ POINTER ═══════════ */
let drag=null;
map.addEventListener('pointerdown',e=>{if(e.button!==0)return;map.setPointerCapture(e.pointerId);
  const u=toUser(e);mouseUser=u;
  const hitVert=e.target.classList.contains('ghost-vert');
  const hitZone=e.target.closest('#zonesG polygon');
  const hitUnit=e.target.closest('#unitsG .unitPin');
  const hitPlace=e.target.closest('#placesG .placePin');
  if(tool==='pan'||e.shiftKey){drag={type:'pan',sx:e.clientX,sy:e.clientY,px:panX,py:panY};map.classList.add('panning');return;}
  if(tool==='zone'){if(!draft)draft=[];draft.push([+gsnap(u.x).toFixed(1),+gsnap(u.y).toFixed(1)]);drawDraft();return;}
  if(tool==='unit'){dropUnit(u.x,u.y);return;}
  if(tool==='place'){addPlace(u.x,u.y);return;}
  if(tool==='delete'){if(hitZone)delFeature(hitZone.dataset.id);else if(hitUnit)delFeature(hitUnit.dataset.id);else if(hitPlace)delFeature(hitPlace.dataset.id);return;}
  // SELECT
  if(hitVert){const f=S.features.find(x=>x.id===sel);drag={type:'vert',f,vi:+e.target.dataset.vi};pushUndo();return;}
  if(hitZone){sel=hitZone.dataset.id;const f=S.features.find(x=>x.id===sel);drag={type:'move',f,start:u,orig:JSON.parse(JSON.stringify(f.points))};pushUndo();renderAll();return;}
  if(hitUnit){sel=hitUnit.dataset.id;const f=S.features.find(x=>x.id===sel);drag={type:'movePt',f,start:u,ox:f.x,oy:f.y};pushUndo();renderAll();return;}
  if(hitPlace){sel=hitPlace.dataset.id;const f=S.features.find(x=>x.id===sel);drag={type:'movePt',f,start:u,ox:f.x,oy:f.y};pushUndo();renderAll();return;}
  sel=null;renderAll();drag={type:'pan',sx:e.clientX,sy:e.clientY,px:panX,py:panY,maybe:true};});
map.addEventListener('pointermove',e=>{const u=toUser(e);mouseUser=u;$('#coordChip').textContent=`${u.x.toFixed(0)} , ${u.y.toFixed(0)}`;
  if(tool==='zone'&&draft&&draft.length)drawDraft(u);
  if(!drag)return;
  if(drag.type==='pan'){if(drag.maybe&&Math.abs(e.clientX-drag.sx)<3&&Math.abs(e.clientY-drag.sy)<3)return;panX=drag.px+(e.clientX-drag.sx);panY=drag.py+(e.clientY-drag.sy);applyViewport();return;}
  if(drag.type==='vert'){drag.f.points[drag.vi]=[+gsnap(u.x).toFixed(1),+gsnap(u.y).toFixed(1)];renderZones();renderHandles();return;}
  if(drag.type==='move'){const dx=u.x-drag.start.x,dy=u.y-drag.start.y;drag.f.points=drag.orig.map(p=>[+gsnap(p[0]+dx).toFixed(1),+gsnap(p[1]+dy).toFixed(1)]);renderZones();renderHandles();return;}
  if(drag.type==='movePt'){drag.f.x=+gsnap(drag.ox+(u.x-drag.start.x)).toFixed(1);drag.f.y=+gsnap(drag.oy+(u.y-drag.start.y)).toFixed(1);renderUnits();renderPlaces();return;}});
map.addEventListener('pointerup',()=>{map.classList.remove('panning');if(drag&&['move','movePt','vert'].includes(drag.type)){save();buildInspector();}drag=null;});
map.addEventListener('dblclick',()=>{if(tool==='zone')finishDraft();});

function drawDraft(cursor){const g=$('#draftG');if(!g)return;g.innerHTML='';if(!draft||!draft.length)return;
  const pts=[...draft];let d='M '+pts.map(p=>p[0]+' '+p[1]).join(' L ');
  g.appendChild(el('path',{d:d+(cursor?` L ${cursor.x.toFixed(0)} ${cursor.y.toFixed(0)}`:'')+(pts.length>1?' Z':''),
    fill:'#C9A84C',"fill-opacity":.14,stroke:'#E8C765',"stroke-width":1.8,"stroke-dasharray":'5 4'}));
  pts.forEach((p,i)=>g.appendChild(el('circle',{cx:p[0],cy:p[1],r:i===0?5:4,fill:i===0?'#E8C765':'#fff',stroke:'#C9A84C',"stroke-width":1.5})));}
function finishDraft(){if(!draft||draft.length<3){draft=null;$('#draftG').innerHTML='';return;}
  pushUndo();const f={id:uid(),kind:'zone',name_ar:'منطقة جديدة',name_en:'',cat:'retail',status:'vacant',
    color:CATS.retail.color,area:Math.round(polyArea(draft)),capacity:0,activities:[],notes:'',code:nextCode('Z-'),points:draft.slice()};
  S.features.push(f);draft=null;sel=f.id;setTool('select');renderAll();save();toast('أُضيفت منطقة — حرّر خصائصها');}
function polyArea(pts){let a=0;for(let i=0;i<pts.length;i++){const[x1,y1]=pts[i],[x2,y2]=pts[(i+1)%pts.length];a+=x1*y2-x2*y1;}return Math.abs(a/2);}
function dropUnit(x,y){pushUndo();const t=currentUnit;
  const f={id:uid(),kind:'unit',unitType:t,name_ar:UNIT_TYPES[t].ar+' جديد',tenant:'',status:'vacant',color:UNIT_TYPES[t].accent,area:9,price:0,notes:'',code:nextCode('K-'),x:+gsnap(x).toFixed(1),y:+gsnap(y).toFixed(1)};
  S.features.push(f);sel=f.id;renderAll();save();toast('أُضيفت وحدة: '+UNIT_TYPES[t].ar);}
function addPlace(x,y){pushUndo();const f={id:uid(),kind:'place',name_ar:'معلم جديد',name_en:'',cat:'service',status:'vacant',color:CATS.service.color,code:nextCode('P-'),x:+gsnap(x).toFixed(1),y:+gsnap(y).toFixed(1),activities:[],notes:''};
  S.features.push(f);sel=f.id;setTool('select');renderAll();save();toast('أُضيف معلم');}

/* ═══════════ KEYBOARD ═══════════ */
document.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))return;
  if(e.ctrlKey||e.metaKey){if(e.key==='z'){e.preventDefault();undo();}if(e.key==='y'||(e.shiftKey&&e.key==='Z')){e.preventDefault();redo();}return;}
  const k=e.key.toLowerCase();
  if(k==='v')setTool('select');else if(k==='z')setTool('zone');else if(k==='u')setTool('unit');
  else if(k==='p')setTool('place');else if(k==='d')setTool('delete');
  else if(k===' '){e.preventDefault();setTool('pan');}
  else if(k==='enter'&&tool==='zone')finishDraft();
  else if(k==='escape'){draft=null;$('#draftG').innerHTML='';sel=null;renderAll();}
  else if((k==='delete'||k==='backspace')&&sel)delFeature(sel);});

/* ═══════════ TOP BAR ACTIONS ═══════════ */
$('#btnUndo').onclick=undo;$('#btnRedo').onclick=redo;$('#btnTidy').onclick=tidyZones;
$('#btnSnap').onclick=()=>{snap=!snap;$('#btnSnap').classList.toggle('on',snap);toast(snap?'تثبيت الشبكة مُفعّل':'تثبيت الشبكة مُعطّل');};
$('#btnSave').onclick=()=>{save();toast('تم الحفظ محلياً ✓');};

/* ═══════════ IO ═══════════ */
$('#btnExport').onclick=()=>modal(`<h2>تصدير المخطّط</h2><p>JSON يحفظ كل القطع والوحدات والمعالم ويُستورد لاحقاً.</p>
  <div class="row" style="flex-direction:column;gap:9px">
    <button class="tbtn gold" style="justify-content:center" onclick="exportJSON();closeModal()">⭱ ملف JSON (بيانات كاملة)</button>
    <button class="tbtn" style="justify-content:center" onclick="exportSVG();closeModal()">🖼 صورة SVG متجهة</button>
    <button class="tbtn" style="justify-content:center" onclick="exportPNG();closeModal()">📷 صورة PNG</button>
    <button class="tbtn danger" style="justify-content:center;border-color:rgba(212,90,74,.4)" onclick="resetScene()">↺ إعادة للوضع الافتراضي</button>
    <button class="tbtn" style="justify-content:center;border:0;color:var(--muted)" onclick="closeModal()">إلغاء</button></div>`);
function exportJSON(){const out={_app:'maham-site-map-studio',_schema:'maham-sitemap-layout@1',_v:1,_target:'spaces+sections',_exportedFor:'admin Units (قسم الوحدات) integration',...S};
  download(JSON.stringify(out,null,2),'maham-site-map-layout.json','application/json');toast('صُدّر JSON ✓ — جاهز للربط بقسم الوحدات');}
function exportSVG(){const clone=map.cloneNode(true);clone.setAttribute('xmlns',SVGNS);
  $$('.ghost-vert',clone).forEach(n=>n.remove());const dg=clone.querySelector('#draftG');if(dg)dg.innerHTML='';
  const st=el('style');st.textContent=themeCSS.textContent+';.map{background:#081127}';clone.insertBefore(st,clone.firstChild);
  download('<?xml version="1.0" encoding="UTF-8"?>\n'+new XMLSerializer().serializeToString(clone),'maham-site-map.svg','image/svg+xml');toast('صُدّر SVG ✓');}
function exportPNG(){try{const s=new XMLSerializer().serializeToString(map);const blob=new Blob([s],{type:'image/svg+xml'});const url=URL.createObjectURL(blob);
  const img=new Image();img.onload=()=>{const c=document.createElement('canvas');c.width=1540;c.height=2168;const ctx=c.getContext('2d');
    ctx.fillStyle='#081127';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.width,c.height);
    c.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='maham-site-map.png';a.click();URL.revokeObjectURL(url);toast('صُدّر PNG ✓');});};
  img.onerror=()=>toast('تعذّر PNG — جرّب SVG');img.src=url;}catch(e){toast('تعذّر PNG — جرّب SVG');}}
function resetScene(){closeModal();modal(`<h2>إعادة للوضع الافتراضي؟</h2><p>سيُستبدل المخطّط الحالي بالترتيب الافتراضي المنظّم. لا يمكن التراجع بعد الحفظ.</p>
  <div class="row"><button class="tbtn" onclick="closeModal()">إلغاء</button><button class="tbtn gold" onclick="doReset()">نعم، أعد الضبط</button></div>`);}
function doReset(){pushUndo();S=defaultScene();sel=null;underlay=null;closeModal();renderAll();save();toast('أُعيد الضبط الافتراضي');}
$('#btnImport').onclick=()=>$('#fileImport').click();
$('#fileImport').onchange=e=>{const file=e.target.files[0];if(!file)return;const rd=new FileReader();
  rd.onload=()=>{try{const o=JSON.parse(rd.result);if(!o.features)throw 0;pushUndo();S.features=o.features;S.visitorPath=o.visitorPath||S.visitorPath;S.meta=o.meta||S.meta;sel=null;renderAll();save();toast('استُورد المخطّط ✓');}catch(err){toast('ملف غير صالح');}};
  rd.readAsText(file);e.target.value='';};
$('#btnUnderlay').onclick=()=>{if(underlay){modal(`<h2>الصورة المرجعية</h2><p>تحكّم بشفافية صورة الـ CAD لترسم فوقها بدقّة.</p>
    <div class="field"><label>الشفافية</label><input type="range" id="ulOp" min="0" max="100" value="${Math.round((underlay.opacity??.5)*100)}"/></div>
    <div class="row"><button class="tbtn danger" style="border-color:rgba(212,90,74,.5)" onclick="removeUnderlay()">إزالة</button>
    <button class="tbtn" onclick="$('#fileUnderlay').click()">استبدال</button><button class="tbtn gold" onclick="closeModal()">تم</button></div>`);
    setTimeout(()=>{$('#ulOp')&&($('#ulOp').oninput=e=>{underlay.opacity=e.target.value/100;renderUnderlay();save();});},0);} else $('#fileUnderlay').click();};
$('#fileUnderlay').onchange=e=>{const file=e.target.files[0];if(!file)return;const rd=new FileReader();
  rd.onload=()=>{underlay={href:rd.result,opacity:.5};layers.underlay=true;renderAll();save();toast('حُمّلت الصورة المرجعية — ارسم فوقها');closeModal();};
  rd.readAsDataURL(file);e.target.value='';};
function removeUnderlay(){underlay=null;renderAll();save();closeModal();toast('أُزيلت الصورة المرجعية');}

/* ═══════════ MODAL/TOAST ═══════════ */
function modal(html){$('#modalBox').innerHTML=html;$('#modalBg').classList.add('show');}
function closeModal(){$('#modalBg').classList.remove('show');}
$('#modalBg').onclick=e=>{if(e.target.id==='modalBg')closeModal();};
let toastT;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}
function download(text,name,type){const b=new Blob([text],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}

  .map .rock{fill:#2a3550;fill-opacity:.5;stroke:#5a6b8e;stroke-width:.8;stroke-opacity:.5}

  .map.vBlue #lParking,.map.vBlue #lRocky{opacity:.5}

  .map .roadEdge{fill:none;stroke:#aebed8;stroke-width:3.5;stroke-opacity:.3;stroke-linecap:round}

document.head.appendChild(themeCSS);

/* ═══════════ BOOT ═══════════ */
buildPalette();renderAll();refreshUndo();
$('#bmProj')&&($('#bmProj').textContent=S.meta?.name||'صيف وسمره · حديقة دلغان');
toast('جاهز — جرّب أداة «وحدة» 🏪 لإضافة كباين وأكشاك');
</script>
